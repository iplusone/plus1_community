name: plus1_community

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-plus1-community
    ports:
      - "8021:80" # http://localhost:8021
    depends_on:
      - php
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html
    networks: [ appnet ]

  php:
    build:
      context: ./docker/php
    container_name: php-plus1-community
    environment:
      TZ: Asia/Tokyo
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    networks: [ appnet ]
    user: "${UID:-1000}:${GID:-1000}"

  node:
    image: node:20-alpine
    container_name: node-plus1-community
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev"
    ports:
      - "5185:5173"
    volumes:
      - ./:/var/www/html
    networks: [ appnet ]

  mysql:
    image: mysql:8.4
    container_name: mysql-plus1-community
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      TZ: Asia/Tokyo
    ports:
      - "3321:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks: [ appnet ]

  redis:
    image: redis:7-alpine
    container_name: redis-plus1-community
    ports:
      - "16380:6379"
    networks: [ appnet ]

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit-plus1-community
    ports:
      - "8035:8025" # UI
      - "1035:1025" # SMTP
    networks: [ appnet ]

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: phpmyadmin-plus1-community
    environment:
      PMA_HOST: mysql
      PMA_USER: laravel
      PMA_PASSWORD: laravel
    ports:
      - "8022:80"
    depends_on:
      - mysql
    networks: [ appnet ]

volumes:
  dbdata:
    name: plus1_community_dbdata


networks:
  appnet:
    name: plus1_community_appnet
    driver: bridge
